
<div class="container mt-5">
  <div class="row">
    <div class="col-12">
      <button (click)="onClick()" class="btn btn-sm btn-outline-primary mr-4">click</button>
      <button (click)="onUserNameChange()" class="btn btn-sm btn-outline-primary mr-4">Change UserName</button>
      <button (click)="onAppend()" class="btn btn-sm btn-outline-primary">Append</button>
      <hr>
      
      <h1>
        <small class="badge badge-primary mr-4">{{counter().val}}</small>

        <small class="badge badge-primary mr-4">{{doubleTheCounter()}}</small>

        <small class="badge badge-primary mr-4">{{userInfo().userName}}</small>
        <small class="badge badge-primary">{{ nums() }}</small>
      </h1>
    </div>
  </div>
</div>
